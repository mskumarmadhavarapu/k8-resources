apiVersion: v1
kind: Pod
metadata:
  name: resources-demo
spec:
  containers:
    - name: nginx
      image: nginx
      resources:
      # soft limit
      requests:
        memory: "64Mi" # RAM
        cpu: "100m" # CPU
      
      # hard limit
      limit:
        memory: "120Mi" # RAM
        cpu: "150m" # CPU